name: Site Monitor

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run site monitor
        env:
          TELEGRAM_TOKEN: ${{ 7984798242:AAH97OBuxnxHGocHjXnN8yjsbo3lwk5h_uU }}
          TELEGRAM_CHAT_ID: ${{ 1058896322 }}
        run: python monitor.py
